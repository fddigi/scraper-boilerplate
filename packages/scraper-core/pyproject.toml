[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scraper-core"
version = "0.1.0"
description = "Shared library for the scraper -> local SQLite -> Turso delta-sync pattern. In a real multi-project setup this package would live in its own git repo and be installed via `pip install git+https://github.com/<you>/scraper-core.git`. Here it lives inline for boilerplate convenience."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
dependencies = [
    "libsql-client>=0.3.0",
    "pydantic-settings>=2.2",
    "requests>=2.31",
    "rich>=13.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[tool.setuptools.packages.find]
include = ["scraper_core*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
